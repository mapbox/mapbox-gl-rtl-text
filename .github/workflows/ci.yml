name: CI

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'

    - run: npm ci
    - run: npm test
    - run: npm run build

    - uses: actions/upload-artifact@v4
      with:
        name: mapbox-gl-rtl-text
        path: dist
        retention-days: 7
